<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinay Sharma | Resume</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #141413;
        color: #e6e4de;
        font-family: Inter, system-ui, sans-serif;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.25rem;
        background: #161615;
        border-bottom: 1px solid #292928;
      }
      .topbar h1 {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .topbar a {
        color: #cc4529;
        text-decoration: none;
        font-weight: 600;
      }
      .viewer {
        width: 100%;
        height: calc(100vh - 72px);
        background: #121211;
      }
      object {
        width: 100%;
        height: 100%;
        border: none;
      }
      .fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 2rem;
        text-align: center;
        color: #a9a29c;
        background: #111;
      }
      .fallback a {
        color: #cc4529;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>Vinay Sharma — Resume</h1>
      <a href="resume.pdf" target="_blank" rel="noopener noreferrer">Open raw PDF</a>
    </div>
    <div class="viewer">
      <object data="resume.pdf" type="application/pdf">
        <div class="fallback">
          Your browser cannot display PDFs inline. 
          <a href="resume.pdf" target="_blank" rel="noopener noreferrer">Open the resume directly</a>.
        </div>
      </object>
    </div>
  </body>
</html>
